<app-viewer-toolbar
  [documentName]="documentName()"
  [zoom]="zoom()"
  (zoomIn)="zoomIn()"
  (zoomOut)="zoomOut()"
  (save)="saveDocument()"
/>

<main>
  @for (page of pages(); track page.number) {
    <app-document-page
      [page]="page"
      [annotations]="annotations()"
      [pageWidth]="pageWidth()"
      [zoom]="zoom()"
      (addAnnotation)="onAddAnnotation($event)"
      (updateAnnotation)="onUpdateAnnotation($event)"
      (moveAnnotation)="onMoveAnnotation($event)"
      (removeAnnotation)="onRemoveAnnotation($event)"
    />
  }
</main>
